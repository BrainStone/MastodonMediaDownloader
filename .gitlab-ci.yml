stages:
  - lint
  - test
  - build

variables:
  PYTHON_VERSION: "3.12"
  UV_CACHE_DIR: .uv-cache
  UV_LINK_MODE: copy

default:
  image: ghcr.io/astral-sh/uv:python${PYTHON_VERSION}-trixie
  cache:
    key:
      files:
        - uv.lock
      prefix: ${PYTHON_VERSION}
    paths:
      - $UV_CACHE_DIR

ruff:
  stage: lint
  needs: [ ]
  script:
    - uv run ruff check . --output-format gitlab --output-file ruff-code-quality.json
  allow_failure: true
  artifacts:
    when: always
    reports:
      codequality: ruff-code-quality.json

mypy:
  stage: lint
  needs: [ ]
  script:
    - uv run mypy . --no-error-summary > mypy-out.txt || MYPY_EXIT=$?
    - cat mypy-out.txt
    - uv run mypy-gitlab-code-quality < mypy-out.txt > mypy-code-quality.json
    - exit ${MYPY_EXIT:-0}
  allow_failure: true
  artifacts:
    when: always
    reports:
      codequality: mypy-code-quality.json

test:
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: [ "3.12", "3.13", "3.14" ]
  needs:
    - ruff
    - mypy
  script:
    - uv run pytest --junitxml=junit.xml --cov=mmdl --cov-report=term --cov-report=xml:coverage.xml
  allow_failure: true
  coverage: '/(?i)total.*? (100(?:\.0+)?%|[1-9]?\d(?:\.\d+)?%)/'
  artifacts:
    when: always
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

.build:
  stage: build
  needs:
    - test

build:linux:
  extends: .build
  script:
    - uv run --with pyinstaller pyinstaller --onefile --name mmdl --paths src src/mmdl/main.py
  artifacts:
    paths:
      - dist/mmdl

build:windows:
  extends: .build
  image: tobix/pywine:${PYTHON_VERSION}
  script:
    - apt-get update && apt-get install -y curl
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH=$HOME/.local/bin:$PATH
    - uv export --format requirements.txt > requirements.txt
    - WINE_SITE_PACKAGES=$(wine python -c "import site; print(site.getsitepackages()[0])")
    - WINE_SITE_PACKAGES_UNIX=$(winepath -u "$WINE_SITE_PACKAGES")
    - uv pip install --python-platform windows --python-version ${PYTHON_VERSION} --target "$WINE_SITE_PACKAGES_UNIX" -r requirements.txt . pyinstaller
    - wine python -m PyInstaller --onefile --name mmdl --paths src src/mmdl/main.py
  artifacts:
    paths:
      - dist/mmdl.exe
