stages:
  - lint
  - test
  - build

variables:
  PYTHON_VERSION: "3.12"
  UV_CACHE_DIR: .uv-cache
  UV_LINK_MODE: copy

default:
  image: ghcr.io/astral-sh/uv:python${PYTHON_VERSION}-trixie-slim
  cache:
    key:
      files:
        - uv.lock
      prefix: ${PYTHON_VERSION}
    paths:
      - $UV_CACHE_DIR

ruff:
  stage: lint
  needs: [ ]
  script:
    - uv run ruff check . --output-format gitlab --output-file ruff-code-quality.json
  allow_failure: true
  artifacts:
    when: always
    reports:
      codequality: ruff-code-quality.json

mypy:
  stage: lint
  needs: [ ]
  script:
    - uv run mypy . --no-error-summary > mypy-out.txt || MYPY_EXIT=$?
    - cat mypy-out.txt
    - uv run mypy-gitlab-code-quality < mypy-out.txt > mypy-code-quality.json
    - exit ${MYPY_EXIT:-0}
  allow_failure: true
  artifacts:
    when: always
    reports:
      codequality: mypy-code-quality.json

test:
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: [ "3.12", "3.13", "3.14" ]
  needs:
    - ruff
    - mypy
  script:
    - uv run pytest --junitxml=junit.xml --cov=mmdl --cov-report=term --cov-report=xml:coverage.xml
  allow_failure: true
  coverage: '/(?i)total.*? (100(?:\.0+)?%|[1-9]?\d(?:\.\d+)?%)/'
  artifacts:
    when: always
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

build:linux:
  stage: build
  needs:
    - job: test
      optional: true
  script:
    - uv run --with pyinstaller pyinstaller --onefile --name mmdl --paths src src/mmdl/main.py
  artifacts:
    paths:
      - dist/mmdl

build:windows:
  stage: build
  image:
    name: tobix/pyinstaller-windows:python3
    entrypoint: [""]
  needs:
    - job: test
      optional: true
  script:
    - wine python -m pip install .
    - wine pyinstaller --onefile --name mmdl --paths src src/mmdl/main.py
  artifacts:
    paths:
      - dist/mmdl.exe
